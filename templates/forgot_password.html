<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>找回密码 - 疲劳驾驶智能检测系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* 浅色学术风卡片背景 */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--background-color, #f4f6f9);
        }

        .auth-card {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: var(--card-background, #ffffff);
            border-radius: 12px;
            box-shadow: 0 8px 30px var(--shadow-color, rgba(0, 0, 0, 0.08));
            border: 1px solid var(--border-color, #dee2e6);
            text-align: center;
            box-sizing: border-box;
        }

        .auth-card h1 {
            color: var(--text-color, #333);
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary-color, #666);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-background, #fff);
            border: 1px solid var(--border-color, #ccc);
            border-radius: 8px;
            color: var(--text-color, #333);
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color, #007bff);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        /* 🌟 究极硬核修复：Grid 网格布局，绝对防重叠！ */
        .grid-row {
            display: grid !important;
            grid-template-columns: 6fr 4fr !important; /* 左侧占十分之六，右侧占十分之四 */
            gap: 12px !important; /* 控件之间的绝对间距 */
            align-items: center !important;
            width: 100% !important;
        }

        /* 强制网格里的输入框和按钮高度绝对一致，且不许乱动 */
        .grid-row input, .grid-row button {
            width: 100% !important;
            margin: 0 !important;
            height: 48px !important; /* 强行锁死高度，确保在同一水平面 */
            box-sizing: border-box !important;
        }

        .grid-row button {
            background: var(--primary-color, #007bff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            padding: 0 !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .grid-row button:disabled {
            background: #e9ecef !important;
            color: #6c757d !important;
            border: 1px solid #ced4da !important;
            cursor: not-allowed;
        }

        .main-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-color, #007bff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .main-btn:hover {
            opacity: 0.9;
        }

        .auth-links {
            margin-top: 25px;
            font-size: 14px;
        }

        .auth-links a {
            color: var(--primary-color, #007bff);
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        #message {
            margin-top: 15px;
            min-height: 20px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>找回密码</h1>

            <form id="reset-form" onsubmit="return false;">
                <div id="step-1">
                    <div class="form-group">
                        <label for="email">注册邮箱</label>
                        <input type="email" id="email" name="email" placeholder="请输入您的注册邮箱" required>
                    </div>

                    <div class="grid-row" style="margin-bottom: 20px;">
                        <input type="text" id="code" name="code" placeholder="6位验证码" maxlength="6" disabled>
                        <button type="button" id="send-code-btn">获取验证码</button>
                    </div>

                    <button type="button" id="verify-btn" class="main-btn">下一步</button>
                </div>

                <div id="step-2" style="display:none;">
                    <div class="form-group">
                        <label for="password">新密码</label>
                        <input type="password" id="password" name="password" placeholder="请输入新密码 (至少6位)" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">确认新密码</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="请再次输入新密码" required>
                    </div>
                    <button type="button" id="reset-btn" class="main-btn">确认重置</button>
                </div>
            </form>

            <div id="message"></div>
            
            <div class="auth-links">
                <a href="{{ url_for('login') }}">返回登录</a>
            </div>
        </div>
    </div>

    <script>
        const messageDiv = document.getElementById('message');
        const step1Div = document.getElementById('step-1');
        const step2Div = document.getElementById('step-2');
        
        const emailInput = document.getElementById('email');
        const codeInput = document.getElementById('code');
        const sendCodeBtn = document.getElementById('send-code-btn');
        const verifyBtn = document.getElementById('verify-btn');

        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const resetBtn = document.getElementById('reset-btn');

        // 倒计时逻辑
        function startCountdown() {
            let seconds = 60;
            sendCodeBtn.disabled = true;
            sendCodeBtn.innerText = `${seconds}s后重发`;
            
            const interval = setInterval(() => {
                seconds--;
                sendCodeBtn.innerText = `${seconds}s后重发`;
                if (seconds <= 0) {
                    clearInterval(interval);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.innerText = '获取验证码';
                }
            }, 1000);
        }

        // 发送验证码
        sendCodeBtn.addEventListener('click', () => {
            const email = emailInput.value;
            if (!email) {
                showMessage('请输入邮箱地址！', 'error');
                return;
            }

            showMessage('正在发送验证码...', 'info');
            sendCodeBtn.disabled = true;

            const formData = new FormData();
            formData.append('email', email);

            fetch("{{ url_for('forgot_password') }}", { method: "POST", body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage(data.message, 'success');
                    codeInput.disabled = false;
                    codeInput.focus();
                    startCountdown();
                } else {
                    showMessage(data.message, 'error');
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.innerText = '获取验证码';
                }
            })
            .catch(() => {
                showMessage('网络错误，请稍后重试', 'error');
                sendCodeBtn.disabled = false;
                sendCodeBtn.innerText = '获取验证码';
            });
        });

        // 验证并下一步
        verifyBtn.addEventListener('click', () => {
            const email = emailInput.value;
            const code = codeInput.value;
            
            if (!code || code.length !== 6) {
                showMessage('请输入完整的6位验证码', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('email', email);
            formData.append('code', code);

            fetch("{{ url_for('verify_code') }}", { method: "POST", body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    step1Div.style.display = 'none';
                    step2Div.style.display = 'block';
                    showMessage('', 'info');
                } else {
                    showMessage(data.message, 'error');
                }
            });
        });

        // 重置密码
        resetBtn.addEventListener('click', () => {
            const pwd = passwordInput.value;
            const confirm = confirmPasswordInput.value;

            if (pwd.length < 6) {
                showMessage('密码长度至少6位', 'error');
                return;
            }
            if (pwd !== confirm) {
                showMessage('两次密码输入不一致', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('email', emailInput.value);
            formData.append('password', pwd);

            fetch("{{ url_for('reset_with_code') }}", { method: "POST", body: formData })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showMessage(data.message, 'success');
                    setTimeout(() => { window.location.href = data.redirect_url; }, 2000);
                } else {
                    showMessage(data.message, 'error');
                }
            });
        });

        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            if (type === 'error') messageDiv.style.color = '#dc3545';
            else if (type === 'success') messageDiv.style.color = '#28a745';
            else messageDiv.style.color = '#666';
        }
    </script>
</body>
</html>
