{% extends "layout.html" %}

{% block title %}视频识别 - {{ super() }}{% endblock %}

{% block page_title %}视频文件疲劳检测{% endblock %}

{% block content %}
<div class="content-card full-height">
    <div style="margin-bottom: 15px;">
        <a href="{{ url_for('index') }}" class="btn" style="background-color: #666;"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>

    <div class="recognition-layout">
        <div class="recognition-controls">
            <h3>上传视频</h3>
            <p style="color: var(--text-secondary-color); font-size: 0.9em;">支持 MP4, AVI, MOV 格式</p>
            
            <form action="/upload-video" method="post" enctype="multipart/form-data" id="videoForm">
                <div class="file-drop-area">
                    <span class="file-msg">拖拽视频到此处或点击上传</span>
                    <input class="file-input" type="file" name="file" accept="video/mp4, video/avi, video/mov" required onchange="this.form.submit()">
                </div>
            </form>
            
            <div class="info-box" style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                <p><i class="fas fa-info-circle"></i> 上传后将自动开始逐帧分析。</p>
            </div>
        </div>
        
        <div class="recognition-display">
            <div class="video-placeholder">
                <i class="fas fa-video" style="font-size: 4em; color: var(--border-color); margin-bottom: 20px;"></i>
                <p>请上传视频文件以开始检测</p>
            </div>
        </div>
    </div>
</div>

<style>
    .full-height {
        height: calc(100vh - 160px);
        display: flex;
        flex-direction: column;
    }
    
    .recognition-layout {
        display: flex;
        gap: 30px;
        height: 100%;
    }
    
    .recognition-controls {
        width: 300px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
    }
    
    .recognition-display {
        flex-grow: 1;
        background-color: #000;
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .video-placeholder {
        text-align: center;
        color: var(--text-secondary-color);
    }
    
    .file-drop-area {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 150px;
        border: 2px dashed var(--border-color);
        border-radius: 8px;
        transition: 0.2s;
        cursor: pointer;
        margin-top: 10px;
    }
    
    .file-drop-area:hover {
        border-color: var(--primary-color);
        background-color: rgba(0, 168, 255, 0.05);
    }
    
    .file-input {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 100%;
        opacity: 0;
        cursor: pointer;
    }
</style>
{% endblock %}
